name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # The runner's bundled npm 10.x can crash on `npm ci` ("Exit handler
      # never called"); pin a known-good npm and fall back to install if the
      # clean install still fails for any reason.
      - run: npm install -g npm@10.9.2
      - run: npm ci || npm install
      - run: npm test
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
